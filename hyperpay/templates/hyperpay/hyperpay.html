{% extends "main_django.html" %}
{% load i18n static %}

{% block bodyclass %}zeitlabs-payment kkux-payment-body{% endblock %}

{% block body %}

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
    :root {
        --pay-primary: #007359;
        --pay-primary-hover: #092a1e;
        --pay-bg: #F5F5F5;
        --pay-surface: #FFFFFF;
        --pay-border: #cccccc;
        --pay-text: #333333;
        --pay-text-muted: #616161;
        --pay-accent: #5cd2d5;
        --pay-error: #B20610;
        --pay-error-bg: #FFEBEE;
        --pay-font: 'IBM Plex Sans', 'IBM Plex Sans Arabic', sans-serif;
        --pay-radius: 8px;
        --pay-radius-lg: 14px;
    }

    .hyperpay-page {
        min-height: 60vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        padding-top: 80px;
        background: var(--pay-bg);
        font-family: var(--pay-font);
        -webkit-font-smoothing: antialiased;
    }

    .hyperpay-card {
        width: 100%;
        max-width: 460px;
        background: var(--pay-surface);
        border-radius: var(--pay-radius-lg);
        box-shadow: 0 1px 3px 0 rgba(0,0,0,0.08), 0 1px 2px -1px rgba(0,0,0,0.06);
    }

    .hyperpay-header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 1rem 1.25rem;
        background: var(--pay-primary);
        border-radius: var(--pay-radius-lg) var(--pay-radius-lg) 0 0;
    }
    .hyperpay-header .back-btn {
        display: flex; align-items: center; justify-content: center;
        width: 2rem; height: 2rem;
        border-radius: var(--pay-radius);
        color: var(--pay-surface);
        transition: background 0.15s;
        flex-shrink: 0;
    }
    .hyperpay-header .back-btn:hover { background: rgba(255,255,255,0.12); }
    .hyperpay-header .back-btn svg { width: 18px; height: 18px; }
    .hyperpay-header h1 {
        margin: 0; font-size: 1.0625rem; font-weight: 600;
        color: var(--pay-surface); flex: 1;
    }
    .hyperpay-header .lock-icon {
        display: flex; align-items: center; gap: 0.25rem;
        font-size: 0.75rem; color: rgba(255,255,255,0.85); flex-shrink: 0;
    }
    .hyperpay-header .lock-icon svg { width: 12px; height: 12px; }

    .hyperpay-body { padding: 1.25rem; }

    /* ── Widget ── */
    .wpwl-container { max-width: 100% !important; margin: 0 !important; }
    .wpwl-form { display: flex; flex-direction: column; gap: 0.875rem; }

    .wpwl-group { margin: 0 !important; }
    .wpwl-group-submit { margin-top: 0.5rem !important; }

    .wpwl-label {
        font-family: var(--pay-font) !important;
        font-size: 0.8125rem !important; font-weight: 500 !important;
        color: var(--pay-text-muted) !important;
        margin-bottom: 0.25rem !important;
    }

    .wpwl-control {
        font-family: var(--pay-font) !important;
        font-size: 0.875rem !important; color: var(--pay-text) !important;
        background: var(--pay-surface) !important;
        border: 1px solid var(--pay-border) !important;
        border-radius: var(--pay-radius) !important;
        padding: 0.625rem 0.75rem !important;
        height: 2.75rem !important; width: 100% !important;
        box-sizing: border-box !important;
        box-shadow: none !important; outline: none !important;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .wpwl-control:focus,
    .wpwl-wrapper--focus .wpwl-control,
    .wpwl-control-cardNumber:focus {
        border-color: var(--pay-primary) !important;
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--pay-accent) 25%, transparent) !important;
    }

    /* ── Card brand icon ── */
    .wpwl-wrapper-cardNumber { position: relative; }
    .wpwl-control-cardNumber { padding-left: 2.75rem !important; }
    .wpwl-wrapper-cardNumber .wpwl-brand {
        position: absolute; top: 50%; left: 0.75rem;
        transform: translateY(-50%); z-index: 2;
        display: flex; align-items: center;
    }

    /* ── Brand select ── */
    .wpwl-control-brand {
        appearance: none !important; -webkit-appearance: none !important;
        background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23616161' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") !important;
        background-repeat: no-repeat !important;
        background-position: right 0.75rem center !important;
        padding-right: 2rem !important;
        cursor: pointer !important;
    }

    /* ── Submit ── */
    .wpwl-button {
        display: flex !important; align-items: center !important; justify-content: center !important;
        width: 100% !important;
        padding: 0.75rem 1.5rem !important;
        font-family: var(--pay-font) !important;
        font-size: 0.9375rem !important; font-weight: 600 !important;
        color: var(--pay-surface) !important;
        background: var(--pay-primary) !important;
        border: 1px solid var(--pay-primary) !important;
        border-radius: var(--pay-radius) !important;
        cursor: pointer !important;
        box-shadow: none !important; text-shadow: none !important;
        text-transform: none !important; letter-spacing: normal !important;
        background-image: none !important;
        height: auto !important; min-height: 3rem !important;
        transition: all 0.15s ease;
    }
    .wpwl-button:hover {
        background: var(--pay-primary-hover) !important;
        border-color: var(--pay-primary-hover) !important;
        transform: translateY(-1px);
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06) !important;
    }
    .wpwl-button:active { transform: translateY(0); }

    .wpwl-has-error .wpwl-control {
        border-color: var(--pay-error) !important;
        background: var(--pay-error-bg) !important;
    }
    .wpwl-hint {
        font-family: var(--pay-font) !important;
        font-size: 0.75rem !important; color: var(--pay-error) !important;
        margin-top: 0.25rem !important;
    }

    .hyperpay-footer {
        max-width: 460px; width: 100%; margin-top: 1rem; text-align: center;
    }
    .hyperpay-footer-text {
        font-size: 0.75rem; color: var(--pay-text-muted);
        display: flex; align-items: center; justify-content: center; gap: 0.375rem;
    }
    .hyperpay-footer-text svg { width: 14px; height: 14px; flex-shrink: 0; }

    @media (max-width: 768px) {
        .hyperpay-body { padding: 1rem; }
        .hyperpay-page { padding: 1rem; padding-top: 80px; }
        .hyperpay-card { max-width: 100%; }
        .hyperpay-footer { max-width: 100%; }
    }
</style>

<meta http-equiv="Content-Security-Policy"
      content="
        style-src 'self' {{ transaction_parameters.base_url }} 'unsafe-inline';
        frame-src 'self' {{ transaction_parameters.base_url }};
        script-src 'self' {{ transaction_parameters.base_url }} 'nonce-{{ transaction_parameters.nonce_id }}';
        connect-src 'self' {{ transaction_parameters.base_url }};
        img-src 'self' {{ transaction_parameters.base_url }};">

<script
    src="{{ transaction_parameters.payment_page_url }}"
    integrity="{{ transaction_parameters.integrity }}"
    crossorigin="anonymous">
</script>

<script nonce="{{ transaction_parameters.nonce_id }}">
    var wpwlOptions = {
      style: 'plain',
      brandDetection: true,
      brandDetectionType: 'binlist',
      locale: "{{ transaction_parameters.locale }}",
      maskCvv: true,
      billingAddress: {},
      mandatoryBillingFields: {
        country: true,
        state: true,
        city: true,
        postcode: true,
        street1: true,
        street2: false
      }
    };
</script>

<div class="hyperpay-page">
    <div class="hyperpay-card">
        <div class="hyperpay-header">
            <a href="javascript:history.back()" class="back-btn" aria-label="{% trans 'Back' %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </a>
            <h1>{% trans "Card Payment" %}</h1>
            <span class="lock-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                {% trans "Secure" %}
            </span>
        </div>
        <div class="hyperpay-body">
            <form action="{{ transaction_parameters.return_url }}"
                  class="paymentWidgets"
                  data-brands="{{ transaction_parameters.brands }}">
                <input type="hidden" name="locale" value="ar">
            </form>
        </div>
    </div>

    <div class="hyperpay-footer">
        <p class="hyperpay-footer-text">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            {% trans "Your payment is processed securely by HyperPay" %}
        </p>
    </div>
</div>

<script src="{% static 'js/header/header.js' %}"></script>
{% endblock %}
